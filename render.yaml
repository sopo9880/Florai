services:
  - type: web
    name: florai
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_USE_CLIENT_MOCK_ANALYSIS
        value: "false"
      - key: FLORAI_REDIS_KEY_PREFIX
        value: "florai"
      - key: FLORAI_JOB_TTL_SECONDS
        value: "1800"
      - key: NEXT_PUBLIC_ANALYSIS_POLL_INTERVAL_MS
        value: "40000"
      - key: NEXT_PUBLIC_ANALYSIS_POLL_TIMEOUT_MS
        value: "300000"
      - key: FLORAI_DEBUG_LOG
        value: "false"
      # Render Dashboard에서 REDIS_URL은 실제 Redis 주소로 별도 등록하세요.
      # - key: REDIS_URL
      #   sync: false

